AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aws-llmops-project
  SAM Template for LangGraph AI Agent with Bedrock, DynamoDB, and Fully Explicit API Gateway Auth

Parameters:
  CheckpointTableName:
    Type: String
    Default: handson-langgraph-checkpoints
  WritesTableName:
    Type: String
    Default: handson-langgraph-writes
  ArchiveTableName:
    Type: String
    Default: handson-research-archives-v2

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    EphemeralStorage:
      Size: 1024
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        CHROMA_DB_PATH: /tmp/chroma_db
        CREWAI_STORAGE_DIR: /tmp/crewai_storage
        HF_HOME: /tmp/huggingface
        SENTENCE_TRANSFORMERS_HOME: /tmp/sentence_transformers
        HOME: /tmp
        SSM_PARAM_PREFIX: /handson/langfuse
        PYTHONUTF8: "1"
        CREWAI_LLM_MODEL: "bedrock/amazon.nova-micro-v1:0"

Resources:
  # 1. Lambda 関数の定義
  LangGraphAgentFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # LogGroupName: !Sub "/aws/lambda/${LangGraphAgentFunction}"
      RetentionInDays: 3

  LangGraphAgentFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: v1
    Properties:
      PackageType: Image
      ImageConfig:
        Command: ["crew_app.app_crew.handler"]
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-micro-v1:0"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0"
                - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
            - Effect: Allow
              Action:
                - ssm:GetParameters
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:BatchWriteItem
                - dynamodb:BatchGetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CheckpointTableName}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${WritesTableName}"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ArchiveTableName}"
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParametersByPath
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/langfuse/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/langfuse/"
      Environment:
        Variables:
          BEDROCK_MODEL_ID: "amazon.nova-micro-v1:0"
          CHECKPOINT_TABLE: !Ref CheckpointTableName
          WRITES_TABLE: !Ref WritesTableName
          ARCHIVE_TABLE: !Ref ArchiveTableName

  # 2. 完全明示的な API Gateway の定義
  LangGraphApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: LangGraphApi
      Description: API for LangGraph Agent

  LangGraphApiChatResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt LangGraphApi.RootResourceId
      PathPart: chat
      RestApiId: !Ref LangGraphApi

  LangGraphApiFeedbackResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt LangGraphApi.RootResourceId
      PathPart: feedback
      RestApiId: !Ref LangGraphApi

  LangGraphApiChatMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      ApiKeyRequired: true
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref LangGraphApiChatResource
      RestApiId: !Ref LangGraphApi
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LangGraphAgentFunction.Arn}/invocations"

  LangGraphApiFeedbackMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      ApiKeyRequired: true
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref LangGraphApiFeedbackResource
      RestApiId: !Ref LangGraphApi
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LangGraphAgentFunction.Arn}/invocations"

  LangGraphApiDeploymentV3:
    Type: AWS::ApiGateway::Deployment
    DependsOn: 
      - LangGraphApiChatMethod
      - LangGraphApiFeedbackMethod
    Properties:
      RestApiId: !Ref LangGraphApi

  LangGraphApiProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref LangGraphApiDeploymentV3
      RestApiId: !Ref LangGraphApi
      StageName: Prod

  # 3. 認証リソース
  LangGraphApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: LangGraphAgentKey
      Enabled: true

  LangGraphUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: LangGraphUsagePlan
      ApiStages:
        - ApiId: !Ref LangGraphApi
          Stage: !Ref LangGraphApiProdStage
    DependsOn: LangGraphApiProdStage

  LangGraphUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref LangGraphApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref LangGraphUsagePlan

  # 4. Lambda 実行権限の付与
  LangGraphAgentFunctionChatApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LangGraphAgentFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LangGraphApi}/*/POST/chat"

  LangGraphAgentFunctionFeedbackApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LangGraphAgentFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LangGraphApi}/*/POST/feedback"

  # 5. 研究成果アーカイブ用 DynamoDB テーブル
  ResearchArchivesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref ArchiveTableName
      AttributeDefinitions:
        - AttributeName: content_id
          AttributeType: S
      KeySchema:
        - AttributeName: content_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

Outputs:
  ChatApiEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${LangGraphApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chat"
  ApiKeyId:
    Description: "API Key ID"
    Value: !Ref LangGraphApiKey
# Triggering CI/CD after OIDC secret configuration
