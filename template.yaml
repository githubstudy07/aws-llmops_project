AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  LangGraph Restart - Minimal Agent Setup

Globals:
  Function:
    Timeout: 120
    MemorySize: 512

Resources:
  # Lambda Function
  AgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      Environment:
        Variables:
          BEDROCK_MODEL_ID: "apac.amazon.nova-micro-v1:0"
          PYTHONUTF8: "1"
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        ChatApi:
          Type: Api
          Properties:
            Path: /chat
            Method: post
            RestApiId: !Ref RestartApi

  # API Gateway
  RestartApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: LangGraphRestartPlan

Outputs:
  ChatApiEndpoint:
    Description: "Chat API Endpoint"
    Value: !Sub "https://${RestartApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chat"
