AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aws-llmops-project
  SAM Template for LangGraph AI Agent with Bedrock, DynamoDB, and Fully Explicit API Gateway Auth

Parameters:
  ProjectName:
    Type: String
    Default: handson-research-archives

Globals:
  Function:
    Timeout: 120  # CrewAI処理に十分な時間を確保（APIGWの29秒制限とは別）
    MemorySize: 512
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        CHROMA_DB_PATH: /tmp/chroma_db
        CREWAI_STORAGE_DIR: /tmp/crewai_storage
        HF_HOME: /tmp/huggingface
        SENTENCE_TRANSFORMERS_HOME: /tmp/sentence_transformers
        HOME: /tmp
        SSM_PARAM_PREFIX: /handson/langfuse
        PYTHONUTF8: "1"
        CREWAI_LLM_MODEL: "bedrock/us.amazon.nova-micro-v1:0"

Resources:
  # 1. Lambda 関数の定義
  LangGraphAgentFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # LogGroupName: !Sub "/aws/lambda/${LangGraphAgentFunction}"
      RetentionInDays: 3

  CrewFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: latest
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: "us.amazon.nova-micro-v1:0"
          # ★ Phase 9-2: テーブル名を CloudFormation 参照で設定
          WRITES_TABLE: !Ref ResearchArchivesTable
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          PYTHONUTF8: "1"
          # LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY は
          # SSM Parameter Store 経由で設定
      Policies:
        # ── Bedrock 推論権限 ──
        # ★ 是正: inference-profile ARN 形式に修正
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                # クロスリージョン推論プロファイル（us.amazon.nova-micro-v1:0 等）
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.amazon.*"
                # 東京リージョンのネイティブモデル（フォールバック用）
                - "arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.nova-micro-v1:0"
                - "arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0"
        # ── DynamoDB 操作権限（最小権限）──
        # ★ Phase 9-2 追加
        - DynamoDBCrudPolicy:
            TableName: !Ref ResearchArchivesTable
        # ── SSM パラメータ読み取り権限 ──
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParametersByPath
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/langfuse/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/langfuse/"
      Events:
        ResearchApi:
          Type: Api
          Properties:
            Path: /research
            Method: post
            Auth:
              ApiKeyRequired: true
            RestApiId: !Ref LangGraphApi

  # 2. 完全明示的な API Gateway の定義
  LangGraphApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: LangGraphApi
      Description: API for LangGraph Agent

  LangGraphApiChatResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt LangGraphApi.RootResourceId
      PathPart: chat
      RestApiId: !Ref LangGraphApi

  LangGraphApiFeedbackResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt LangGraphApi.RootResourceId
      PathPart: feedback
      RestApiId: !Ref LangGraphApi

  LangGraphApiChatMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      ApiKeyRequired: true
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref LangGraphApiChatResource
      RestApiId: !Ref LangGraphApi
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrewFunction.Arn}/invocations"

  LangGraphApiFeedbackMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      ApiKeyRequired: true
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref LangGraphApiFeedbackResource
      RestApiId: !Ref LangGraphApi
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrewFunction.Arn}/invocations"

  LangGraphApiDeploymentV3:
    Type: AWS::ApiGateway::Deployment
    DependsOn: 
      - LangGraphApiChatMethod
      - LangGraphApiFeedbackMethod
    Properties:
      RestApiId: !Ref LangGraphApi

  LangGraphApiProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref LangGraphApiDeploymentV3
      RestApiId: !Ref LangGraphApi
      StageName: Prod

  # 3. 認証リソース
  LangGraphApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: LangGraphAgentKey
      Enabled: true

  LangGraphUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: LangGraphUsagePlan
      ApiStages:
        - ApiId: !Ref LangGraphApi
          Stage: !Ref LangGraphApiProdStage
    DependsOn: LangGraphApiProdStage

  LangGraphUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref LangGraphApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref LangGraphUsagePlan

  # 4. Lambda 実行権限の付与
  LangGraphAgentFunctionChatApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CrewFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LangGraphApi}/*/POST/chat"

  LangGraphAgentFunctionFeedbackApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CrewFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LangGraphApi}/*/POST/feedback"

  # ============================================================
  # DynamoDB テーブル（Phase 9-2 追加）
  # ============================================================
  ResearchArchivesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete  # ハンズオン用。本番では Retain を推奨
    Properties:
      TableName: handson-research-archives
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: content_id
          AttributeType: S
      KeySchema:
        - AttributeName: content_id
          KeyType: HASH

# ============================================================
# Outputs
# ============================================================
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${LangGraphApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/research"
  ResearchArchivesTableName:
    Description: DynamoDB table for research archives
    Value: !Ref ResearchArchivesTable
  ResearchArchivesTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt ResearchArchivesTable.Arn
  ApiKeyId:
    Description: "API Key ID"
    Value: !Ref LangGraphApiKey
