AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: langgraph-chat-v58 (LangGraph 1.x + ECR Lifecycle + DynamoDB persistence)

Parameters:
  ImageUriParam:
    Type: String
    Description: URI of the Docker image to use for the Lambda function.

Resources:
  # --- コスト爆発防止用のライフサイクル設定付 ECR リポジトリ ---
  MyRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${AWS::StackName}-repo"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the 3 most recent images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 3
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  CheckpointsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-checkpoints"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: thread_id
          AttributeType: S
        - AttributeName: checkpoint_id
          AttributeType: S
      KeySchema:
        - AttributeName: thread_id
          KeyType: HASH
        - AttributeName: checkpoint_id
          KeyType: RANGE

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-chat"
      PackageType: Image
      ImageUri: !Ref ImageUriParam
      Environment:
        Variables:
          CHECKPOINT_TABLE: !Ref CheckpointsTable
          BEDROCK_MODEL_ID: apac.amazon.nova-micro-v1:0
          AWS_REGION_NAME: !Ref AWS::Region
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CheckpointsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse*
                - dynamodb:DescribeTable
                - ssm:GetParameter
                - ssm:GetParameters
              Resource: "*"
      Events:
        ChatEvent:
          Type: Api
          Properties:
            Path: /chat
            Method: post
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./src
      DockerTag: latest

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chat"
  TableName:
    Value: !Ref CheckpointsTable
