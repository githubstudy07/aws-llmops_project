AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aws-llmops-project
  SAM Template for LangGraph AI Agent with Bedrock, DynamoDB, and Fully Explicit API Gateway Auth

Parameters:
  ProjectName:
    Type: String
    Default: handson-research-archives

Globals:
  Function:
    Timeout: 120  # CrewAI処理に十分な時間を確保（APIGWの29秒制限とは別）
    MemorySize: 512
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        CHROMA_DB_PATH: /tmp/chroma_db
        CREWAI_STORAGE_DIR: /tmp/crewai_storage
        HF_HOME: /tmp/huggingface
        SENTENCE_TRANSFORMERS_HOME: /tmp/sentence_transformers
        HOME: /tmp
        SSM_PARAM_PREFIX: /handson/langfuse
        PYTHONUTF8: "1"
        CREWAI_LLM_MODEL: "bedrock/us.amazon.nova-micro-v1:0"

Resources:
  # 1. Lambda 関数の定義
  LangGraphAgentFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # LogGroupName: !Sub "/aws/lambda/${LangGraphAgentFunction}"
      RetentionInDays: 3

  CrewFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: latest
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: "us.amazon.nova-micro-v1:0"
          # ★ Phase 9-2: テーブル名を CloudFormation 参照で設定
          WRITES_TABLE: !Ref ResearchArchivesTable
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          PYTHONUTF8: "1"
          # LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY は
          # SSM Parameter Store 経由で設定
      Policies:
        # ★ 修正: AWSLambdaBasicExecutionRole (CloudWatch Logs 出力権限)
        - AWSLambdaBasicExecutionRole
        # ── Bedrock 推論権限 ──
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/us.amazon.*"
                - "arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.nova-micro-v1:0"
        # ── DynamoDB 操作権限（最小権限）──
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:DescribeTable
              Resource:
                - !GetAtt ResearchArchivesTable.Arn
                - !Sub "${ResearchArchivesTable.Arn}/index/*"
        # ── SSM パラメータ読み取り権限 ──
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParametersByPath
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/langfuse/*"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/handson/langfuse/"
      Events:
        ChatApi:
          Type: Api
          Properties:
            Path: /chat
            Method: post
            Auth:
              ApiKeyRequired: true
            RestApiId: !Ref LangGraphApi
        ResearchApi:
          Type: Api
          Properties:
            Path: /research
            Method: post
            Auth:
              ApiKeyRequired: true
            RestApiId: !Ref LangGraphApi

  # -------------------------------------------------------
  # 2. API Gateway の定義
  # -------------------------------------------------------
  LangGraphApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: LangGraphApi
      Description: API for CrewAI Agent (Phase 9-2 Corrected)

  # -------------------------------------------------------
  # 3. 認証・認可 (API Key & Usage Plan)
  # -------------------------------------------------------
  LangGraphApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: LangGraphAgentKey
      Enabled: true

  LangGraphUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: LangGraphUsagePlan
      ApiStages:
        - ApiId: !Ref LangGraphApi
          Stage: !Ref LangGraphApiProdStage

  LangGraphApiProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref LangGraphApi
      DeploymentId: !Ref LangGraphApiDeployment
      StageName: Prod

  LangGraphApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CrewFunction
    Properties:
      RestApiId: !Ref LangGraphApi

  LangGraphUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref LangGraphApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref LangGraphUsagePlan

  # -----------------------------------------------------------
  # 4. DynamoDB テーブル（Phase 9-2）
  # -----------------------------------------------------------
  ResearchArchivesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    Properties:
      # ★ Fix: 固定名から動的命名に変更し ResourceExistenceCheck を回避
      #    例: handson-research-archives-handson-llmops-vfinal
      TableName: !Sub "handson-research-archives-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: content_id
          AttributeType: S
      KeySchema:
        - AttributeName: content_id
          KeyType: HASH

# ============================================================
# Outputs
# ============================================================
Outputs:
  ApiEndpoint:
    Description: "API Root Endpoint (SAM Managed)"
    Value: !Sub "https://${LangGraphApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  ResearchArchivesTableName:
    Description: DynamoDB table for research archives
    Value: !Ref ResearchArchivesTable
  ResearchArchivesTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt ResearchArchivesTable.Arn
  ApiKeyId:
    Description: "API Key ID"
    Value: !Ref LangGraphApiKey
