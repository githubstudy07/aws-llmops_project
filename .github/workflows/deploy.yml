name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  SAM_STACK_NAME: handson-llmops-vfinal

jobs:
  # ------------------------------------------------------------------
  # Job 1: テスト (requirements-dev.txt 使用 / pysqlite3 不要環境)
  # ------------------------------------------------------------------
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: |
          # LAMBDA_TASK_ROOT を明示的に unset してテスト環境を保証
          unset LAMBDA_TASK_ROOT
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ -v --tb=short

  # ------------------------------------------------------------------
  # Job 2: ビルド & デプロイ (main ブランチへの push のみ)
  # ------------------------------------------------------------------
  deploy:
    name: SAM Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write  # OIDC 認証用
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --capabilities CAPABILITY_IAM \
            --region ${{ env.AWS_REGION }} \
            --s3-bucket handson-llmops-sam-artifacts-naoji-891377371917 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-image-repos \
            --parameter-overrides Environment=production
