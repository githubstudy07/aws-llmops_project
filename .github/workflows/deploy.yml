name: Deploy SAM Application

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # GitHub Actions-⑭ 手動トリガー

# GitHub Actions-⑬ Concurrency 制御: 前の実行が残っている場合はキャンセルしてコスト節約
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # OIDC 認証に必須
  contents: read  # ソースコード読み取りに必須

jobs:
  # GitHub Actions-5-2 テスト自動化
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/

  deploy:
    needs: test # テストが成功した場合のみデプロイを実行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # GitHub Actions-④ アクション利用

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891377371917:role/github-actions-deployment-role
          aws-region: ap-northeast-1

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name handson-llmops-vfinal \
            --capabilities CAPABILITY_IAM \
            --region ap-northeast-1 \
            --s3-bucket handson-llmops-sam-artifacts-naoji-891377371917 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-image-repos
