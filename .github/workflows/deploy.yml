name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  SAM_STACK_NAME: handson-llmops-v10
  ECR_REPOSITORY: crewai-lambda-app

jobs:
  # ------------------------------------------------------------------
  # Job 1: テスト (requirements-dev.txt 使用 / pysqlite3 不要環境)
  # ------------------------------------------------------------------
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: |
          # LAMBDA_TASK_ROOT を明示的に unset してテスト環境を保証
          unset LAMBDA_TASK_ROOT
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ -v --tb=short

  # ------------------------------------------------------------------
  # Job 2: ビルド & デプロイ (main ブランチへの push のみ)
  # ------------------------------------------------------------------
  deploy:
    name: SAM Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    permissions:
      id-token: write  # OIDC 認証用
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # OIDC 認証
      # ----------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy

      # ----------------------------------------------------------------
      # 認証確認 (デバッグ用)
      # ----------------------------------------------------------------
      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      # ----------------------------------------------------------------
      # ECR ログイン
      # ----------------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ----------------------------------------------------------------
      # ECR リポジトリが存在しない場合は作成
      # ----------------------------------------------------------------
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
          || aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }}

      # ----------------------------------------------------------------
      # SAM セットアップ
      # ----------------------------------------------------------------
      - name: Set up Python 3.12 (SAM CLI 用)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ----------------------------------------------------------------
      # SAM ビルド (Container Image)
      # ----------------------------------------------------------------
      - name: SAM Build
        run: sam build --use-container

      # -------------------------------------------------------
      # デプロイ前: 残留 Log Group のクリーンアップ
      # -------------------------------------------------------
      - name: Cleanup orphaned Log Groups
        run: |
          LOG_GROUPS=$(aws logs describe-log-groups \
            --log-group-name-prefix "/aws/lambda/${{ env.SAM_STACK_NAME }}" \
            --region ${{ env.AWS_REGION }} \
            --query "logGroups[*].logGroupName" \
            --output text)

          if [ -n "$LOG_GROUPS" ]; then
            for lg in $LOG_GROUPS; do
              echo "Deleting orphaned log group: $lg"
              aws logs delete-log-group \
                --log-group-name "$lg" \
                --region ${{ env.AWS_REGION }} || echo "Failed to delete $lg"
            done
          else
            echo "No orphaned log groups found."
          fi

      # -------------------------------------------------------
      # SAM Deploy
      # -------------------------------------------------------
      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --image-repository ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }} \
            --s3-bucket handson-llmops-sam-artifacts-naoji-891377371917 \
            --parameter-overrides Environment=production \
            --debug 2>&1 | tee sam_deploy.log
        continue-on-error: true

      # -------------------------------------------------------
      # 失敗時: CloudFormation イベントの詳細を出力
      # -------------------------------------------------------
      - name: Show CloudFormation diagnostics on failure
        if: always()
        run: |
          if grep -q "Error:" sam_deploy.log; then
            echo "=== CloudFormation Events (Recent) ==="
            aws cloudformation describe-stack-events \
              --stack-name ${{ env.SAM_STACK_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --max-items 30 \
              --output table || true

            echo "=== FAILED ChangeSet Details ==="
            CS=$(aws cloudformation list-change-sets --stack-name ${{ env.SAM_STACK_NAME }} --region ${{ env.AWS_REGION }} --query "Summaries[?Status=='FAILED'] | [0].ChangeSetId" --output text)
            if [ "$CS" != "None" ]; then
              aws cloudformation describe-change-set --stack-name ${{ env.SAM_STACK_NAME }} --change-set-name $CS --region ${{ env.AWS_REGION }} --output json
            fi
            exit 1
          fi
