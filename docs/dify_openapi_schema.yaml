openapi: 3.1.0
info:
  title: LangGraph Agent API
  description: AWS API Gateway 経由で呼び出す LangGraph エージェントツール
  version: 1.0.0
servers:
  - url: https://rxajg598kk.execute-api.ap-northeast-1.amazonaws.com/Prod
paths:
  /chat:
    post:
      operationId: chat_with_agent
      summary: LangGraph エージェントと対話する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: AIエージェントへの質問内容
                session_id:
                  type: string
                  description: 会話履歴を特定するためのID。
              required:
                - message
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                    description: AIからの回答
